{% extends "base.html" %}
{% block title %}Admin Login — Refresh Labs{% endblock %}

{% block content %}
<section class="max-w-sm mx-auto px-4 py-24">
  <h1 class="text-2xl font-bold text-slate-900 mb-6">Admin Login</h1>
  {% if error %}
    <p class="mb-4 text-sm text-red-600">{{ error }}</p>
  {% endif %}
  <form method="post" class="space-y-4">
    <input
      type="password" name="password" placeholder="Password" required autofocus
      class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400"
    >
    <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-lg">Log In</button>
  </form>
</section>
{% endblock %}
